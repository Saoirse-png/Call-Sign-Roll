<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Sign Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Call Sign Generator</h1>
    <button id="generate">Generate Call Sign</button>
    <h2 id="call-sign"></h2>

    <script>
        function generateCallSign() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const numbers = '0123456789';
            let callSign = '';
            for (let i = 0; i < 3; i++) {
                callSign += letters.charAt(Math.floor(Math.random() * letters.length));
            }
            for (let i = 0; i < 2; i++) {
                callSign += numbers.charAt(Math.floor(Math.random() * numbers.length));
            }
            document.getElementById('call-sign').innerText = 'Generated Call Sign: ' + callSign;
        }

        document.getElementById('generate').addEventListener('click', generateCallSign);
    </script>
</body>
</html>
